<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FOR ZEE ❤️</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    font-size:2.2rem;
}

.buttons{
    margin-top:30px;
    position:relative;
    height:120px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
}

#result{
    display:none;
    margin-top:20px;
}

img{
    width:260px;
    border-radius:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>❤️ Zee will you forever be mine? 💍❤️</h1>

<div class="buttons">
    <button id="yes">Yes ❤️</button>
    <button id="no">No </button>
</div>

<div id="result">
    <h2>MWAHHHHHH!!!!!!! 💖💖</h2>
    <p>❤️ Ngiyakuthanda wena ZEE ❤️</p>
    <p>💕💕</p>

    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
</div>

</div>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const result = document.getElementById("result");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton(){
    const x = Math.random() * 200 - 100;
    const y = Math.random() * 200 - 100;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

yesBtn.onclick = function(){
    document.querySelector(".buttons").style.display = "none";
    result.style.display = "block";
}

</script>

</body>
</html>
